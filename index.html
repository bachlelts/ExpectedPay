<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Tính Toán Thu Nhập</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            margin: 0;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        h1 {
            margin-top: 0;
            font-size: 1.75rem;
            color: #0f172a;
            border-bottom: 2px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        select, input[type="number"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 1rem;
            background-color: #fff;
            box-sizing: border-box;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-top: 0.5rem;
        }

        .radio-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: normal;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }

        .result-box {
            margin-top: 2rem;
            padding: 1.5rem;
            background-color: #eff6ff;
            border-left: 4px solid var(--primary);
            border-radius: 0 8px 8px 0;
        }

        .result-title {
            font-weight: 700;
            color: #1e40af;
            font-size: 1.1rem;
            margin-bottom: 0.25rem;
        }

        .result-amount {
            font-size: 2rem;
            font-weight: 800;
            color: #1d4ed8;
        }

        .status {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Công Cụ Tính Thu Nhập Dự Kiến</h1>
    <div id="status" class="status">Đang tải dữ liệu tệp tin...</div>

    <form id="calcForm" style="margin-top: 1.5rem;">
        <div class="form-group">
            <label for="locationGroup">1. Chọn nhóm địa điểm</label>
            <select id="locationGroup" disabled>
                <option value="">-- Vui lòng chọn nhóm trước --</option>
            </select>
        </div>

        <div class="form-group">
            <label for="location">2. Chọn địa điểm cụ thể</label>
            <select id="location" disabled>
                <option value="">-- Vui lòng chọn địa điểm --</option>
            </select>
        </div>

        <div class="form-group">
            <label>Mức độ ưu tiên của địa điểm (Priority)</label>
            <input type="text" id="priorityTier" readonly style="background-color: #f1f5f9; color: #475569;" placeholder="Chọn một địa điểm cụ thể để hiển thị mức độ ưu tiên">
        </div>

        <div class="form-group">
            <label>3. Hình thức thuê mặt bằng</label>
            <div class="radio-group">
                <label class="radio-label">
                    <input type="radio" name="rentalCase" value="1" checked> Phương án 1: Chỉ thuê địa điểm (Không có nhân sự)
                </label>
                <label class="radio-label">
                    <input type="radio" name="rentalCase" value="2"> Phương án 2: Thuê kèm nhân sự hỗ trợ
                </label>
            </div>
        </div>

        <div class="form-group">
            <label for="days">4. Số lượng ngày cho thuê</label>
            <input type="number" id="days" min="1" value="30" required>
        </div>

        <div class="form-group hidden" id="workerInputGroup">
            <label for="workers">5. Số lượng nhân sự hỗ trợ</label>
            <input type="number" id="workers" min="1" value="5">
        </div>

        <div class="result-box">
            <div class="result-title">Tổng Doanh Thu Dự Kiến Nhận Được</div>
            <div id="totalPay" class="result-amount">0 ₫</div>
        </div>
    </form>
</div>

<script src="app.js"></script>
</body>
</html>
